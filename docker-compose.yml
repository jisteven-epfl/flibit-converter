services:
  flibit-converter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: always

  dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    command: sh -c "[ -d node_modules ] || npm install; npm run dev -- --host"
